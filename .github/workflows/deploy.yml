name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - 'v*'  # 推送 tag 时触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  contents: write  # 新增：允许创建 Release

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 打包 Release 文件
      - name: Package for Release
        if: startsWith(github.ref, 'refs/tags/')  # 只在打 tag 时打包
        run: |
          mkdir -p release-package/dist
          cp -r dist/* release-package/dist/
          cp pv-tool-agpl_nginx.conf release-package/ 2>/dev/null || true
          cd release-package
          zip -r ../pv-tool-agpl-${{ github.ref_name }}.zip .
          cd ..

      # 上传打包文件供 Release 使用
      - name: Upload Release Package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: pv-tool-agpl-*.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # 新增：创建 Release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # 只在打 tag 时执行
    steps:
      - name: Download Release Package
        uses: actions/download-artifact@v4
        with:
          name: release-package
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: pv-tool-agpl-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## PV Tool AGPL 社区版 - ${{ github.ref_name }}
            
            ### 包含内容
            - 构建产物 (dist 目录)
            - nginx 配置示例 (pv-tool-agpl_nginx.conf)
            
            ### 部署说明
            1. 解压 zip 文件
            2. 将 dist 目录内容上传到你的 Web 服务器
            3. 参考 `pv-tool-agpl_nginx.conf` 配置 nginx
            
            ### 本地运行
            解压后，可以用任意静态服务器运行：
            ```bash
            cd dist
            python -m http.server 8080
            ```
          draft: false
          prerelease: false