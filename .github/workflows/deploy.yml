name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # 判断是否需要部署到 Pages
      - name: Check if should deploy
        id: check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      # 只有 main 分支才上传 Pages artifact
      - name: Upload Pages Artifact
        if: steps.check.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 打包 Release 文件（只在 tag 时打包）
      - name: Package for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-package/dist
          cp -r dist/* release-package/dist/
          # 如果 nginx 配置文件存在则复制
          if [ -f "pv-tool-agpl_nginx.conf" ]; then
            cp pv-tool-agpl_nginx.conf release-package/
          fi
          cd release-package
          zip -r ../pv-tool-agpl-${{ github.ref_name }}.zip .
          cd ..
          
          # 将 zip 文件移到更明确的位置
          mkdir -p artifacts
          mv pv-tool-agpl-*.zip artifacts/

      # 上传打包文件供 Release 使用（只在 tag 时上传）
      - name: Upload Release Package
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: artifacts/pv-tool-agpl-*.zip  # 明确指定路径

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Release Package
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: ./release-artifacts  # 明确指定下载路径
      
      - name: List downloaded files
        run: |
          ls -la ./release-artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./release-artifacts/pv-tool-agpl-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## PV Tool AGPL 社区版 - ${{ github.ref_name }}
            
            ### 包含内容
            - 构建产物 (dist 目录)
            - nginx 配置示例 (pv-tool-agpl_nginx.conf)
            
            ### 部署说明
            1. 解压 zip 文件
            2. 将 dist 目录内容上传到你的 Web 服务器
            3. 参考 `pv-tool-agpl_nginx.conf` 配置 nginx
            
            ### 本地运行
            解压后，可以用任意静态服务器运行：
            ```bash
            cd dist
            python -m http.server 8080
            ```
          draft: false
          prerelease: false